# Deploy static site to GitHub Pages (Settings → Pages → Source: GitHub Actions).
#
# First-time setup:
# 1. Repo → Settings → Secrets and variables → Actions → New repository secret:
#    Name: SITE_PASSWORD   Value: (your team password)
# 2. Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# 3. Push to main (or change the branch below).
#
# URL shapes:
# - Project site: https://<user>.github.io/<repo>/
# - User site (repo named <user>.github.io): base path is "/" automatically.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Resolve Vite base path
        id: base
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        run: npm ci && npm run build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
